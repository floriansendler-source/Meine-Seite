<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Painter Game</title>
<style>
body {
    margin: 0;
    background: #1a1a1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    background: #222;
    display: block;
    margin: auto;
    border: 3px solid white;
    touch-action: none;
}

#ui {
    margin: 10px;
}
</style>
</head>
<body>

<h2>🎨 Painter Game</h2>
<div id="ui">
Level: <span id="level">1</span> |
Fortschritt: <span id="progress">0%</span> |
Score: <span id="score">0</span> |
Highscore: <span id="highscore">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gridSize = 20;
let level = 1;
let score = 0;
let highscore = localStorage.getItem("paintHigh") || 0;
document.getElementById("highscore").innerText = highscore;

let grid = [];
let painted = 0;
let total = 0;

function generateLevel() {
    grid = [];
    painted = 0;
    total = 0;

    for (let y = 0; y < canvas.height; y += gridSize) {
        let row = [];
        for (let x = 0; x < canvas.width; x += gridSize) {
            let fill = Math.random() > 0.2; // Form erzeugen
            row.push(fill ? 0 : -1); // 0 = ungemalt, -1 = leer
            if (fill) total++;
        }
        grid.push(row);
    }
}

generateLevel();

let painting = false;

canvas.addEventListener("mousedown", () => painting = true);
canvas.addEventListener("mouseup", () => painting = false);
canvas.addEventListener("mousemove", paint);

canvas.addEventListener("touchstart", () => painting = true);
canvas.addEventListener("touchend", () => painting = false);
canvas.addEventListener("touchmove", e => {
    let rect = canvas.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    let y = e.touches[0].clientY - rect.top;
    paintPos(x, y);
});

function paint(e) {
    if (!painting) return;
    let rect = canvas.getBoundingClientRect();
    paintPos(e.clientX - rect.left, e.clientY - rect.top);
}

function paintPos(x, y) {
    let gx = Math.floor(x / gridSize);
    let gy = Math.floor(y / gridSize);

    if (grid[gy] && grid[gy][gx] === 0) {
        grid[gy][gx] = 1;
        painted++;
        score += 10;
    }
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[y].length; x++) {

            if (grid[y][x] === -1) continue;

            ctx.fillStyle = grid[y][x] === 1 ? "#4CAF50" : "#555";
            ctx.fillRect(x * gridSize, y * gridSize, gridSize - 2, gridSize - 2);
        }
    }

    let progress = Math.floor((painted / total) * 100);
    document.getElementById("progress").innerText = progress + "%";
    document.getElementById("score").innerText = score;

    if (progress > 95) nextLevel();

    requestAnimationFrame(update);
}

function nextLevel() {
    level++;
    document.getElementById("level").innerText = level;

    score += 100;

    if (score > highscore) {
        localStorage.setItem("paintHigh", score);
    }

    generateLevel();
}

update();
</script>

</body>
</html>
