<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Painter Ultimate – Full Game</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#87CEEB, #eaf6ff);
}
#ui {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 12px 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    z-index: 10;
}
#bar {
    width: 220px;
    height: 12px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 5px;
}
#fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4CAF50, #9CCC65);
}
canvas {
    display: block;
}
</style>
</head>
<body>

<div id="ui">
Level <span id="level">1</span> |
⭐ <span id="stars">0</span>
<div id="bar"><div id="fill"></div></div>
</div>

<canvas id="game"></canvas>

<script>
// --- Setup ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let maskData;
let paintMap;
let totalPaintable = 0;
let paintedPixels = new Set();

let level = 1;
let stars = 0;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    generateLevel();
}
window.addEventListener("resize", resize);
resize();

// --- Generate level with textures ---
function generateLevel() {
    let w = canvas.width;
    let h = canvas.height;

    paintMap = new Uint8Array(w*h);
    paintedPixels.clear();
    totalPaintable = 0;

    ctx.clearRect(0,0,w,h);

    // Himmel
    let sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, "#7ec8ff");
    sky.addColorStop(1, "#eaf6ff");
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);

    let houseW = w*0.55;
    let houseH = h*0.5;
    let x = (w-houseW)/2;
    let y = h*0.3;

    // Wand Textur (leichtes Muster)
    let wall = ctx.createLinearGradient(x, y, x, y+houseH);
    wall.addColorStop(0,"#f5f5f5");
    wall.addColorStop(1,"#dcdcdc");
    ctx.fillStyle = wall;
    ctx.fillRect(x,y,houseW,houseH);

    // Dach
    ctx.fillStyle = "#c62828";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+houseW/2, y-houseH*0.4);
    ctx.lineTo(x+houseW,y);
    ctx.closePath();
    ctx.fill();

    // Fenster
    ctx.fillStyle = "#90caf9";
    ctx.fillRect(x+houseW*0.15, y+houseH*0.2, 90, 90);
    ctx.fillRect(x+houseW*0.65, y+houseH*0.2, 90, 90);

    // Tür
    ctx.fillStyle = "#4e342e";
    ctx.fillRect(x+houseW*0.4, y+houseH*0.55, 90, 140);

    // --- Mask erstellen ---
    let img = ctx.getImageData(0,0,w,h);
    maskData = img.data;

    for(let i=0;i<w*h;i++){
        let r = maskData[i*4];
        let g = maskData[i*4+1];
        let b = maskData[i*4+2];
        if(r>230 && g>230 && b>230){
            paintMap[i] = 0; // paintable
            totalPaintable++;
        } else {
            paintMap[i] = 255; // block
        }
    }
}

// --- Painting ---
function paint(x,y){
    let radius = 22;
    for(let dy=-radius; dy<=radius; dy++){
        for(let dx=-radius; dx<=radius; dx++){
            let px = Math.floor(x+dx);
            let py = Math.floor(y+dy);
            if(px<0||py<0||px>=canvas.width||py>=canvas.height) continue;
            let dist = dx*dx + dy*dy;
            if(dist>radius*radius) continue;
            let index = py*canvas.width + px;
            if(paintMap[index]===0){
                paintMap[index]=1;
                paintedPixels.add(index);
                // Weicher Paint
                ctx.fillStyle = "rgba(76,175,80,0.8)";
                ctx.fillRect(px,py,1,1);
                // Glow
                ctx.fillStyle = "rgba(76,175,80,0.2)";
                ctx.fillRect(px-1,py-1,3,3);
            }
        }
    }
}

let painting=false;
canvas.addEventListener("mousedown", ()=>painting=true);
canvas.addEventListener("mouseup", ()=>painting=false);
canvas.addEventListener("mousemove", e=>{if(painting) paint(e.clientX,e.clientY);});
canvas.addEventListener("touchstart", ()=>painting=true);
canvas.addEventListener("touchend", ()=>painting=false);
canvas.addEventListener("touchmove", e=>{paint(e.touches[0].clientX,e.touches[0].clientY);});

// --- Game Loop ---
function update(){
    let paintedCount = paintedPixels.size;
    let progress = Math.floor(paintedCount/totalPaintable*100);
    document.getElementById("fill").style.width = progress+"%";

    if(progress>92){
        stars++;
        level++;
        document.getElementById("stars").innerText=stars;
        document.getElementById("level").innerText=level;
        generateLevel();
    }
    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
